schema: spec-driven

context: |
  ## Project Overview
  Kuriume is a cross-platform anime browsing, management, and playback application.
  Users can search and browse anime information, manage watchlists and watch history, and play anime videos via torrent streaming or online sources.

  ## Target Platforms
  - macOS (primary), Windows, iOS, Android
  - Desktop uses sidebar layout; mobile uses bottom tab bar layout

  ## Tech Stack
  **Frontend**: React 19 + TypeScript + Vite 7, TanStack Router (file-based), TanStack Query, Tailwind CSS v4, shadcn/ui (new-york), Lucide icons
  **Backend**: Rust + Tauri v2
  **Path alias**: `@/` → `src/`
  **Utility**: `cn()` in `src/lib/utils.ts`

  ## Backend Rust Crates
  - `kuriume-provider`: Anime data source abstraction (Bangumi API, torrent scrapers Mikan/Nyaa/Dmhy, CSS selector rule engine)
  - `kuriume-mpv`: libmpv2 v5 wrapper + GPU render pipeline (macOS: OpenGL→IOSurface→Metal, iOS: EAGL→CVPixelBuffer→Metal)
  - `kuriume-torrent`: librqbit torrent engine + Axum HTTP streaming server
  - `kuriume-store`: SQLite persistence layer (settings, media entries, watch history, watchlist)
  - `tauri-plugin-mpv`: Tauri plugin bridging mpv rendering to the WebView

  ## Dual Video Playback Engines
  1. HTML5 `<video>` player: for online streaming (HTTP/HLS URLs)
  2. Native mpv player: for torrent streaming, rendered behind a transparent WebView overlay

  ## Playback Sources
  - **Torrent**: Mikan/Nyaa/Dmhy search → librqbit download → HTTP stream URL → mpv playback
  - **Online**: CSS selector rule engine scraping → WebView Sniffer intercepts m3u8/MP4 URLs → HTML5 playback
  - **Local cache**: Previously downloaded media registered in SQLite

  ## Frontend Routes
  - `/` Home (ranking carousel + infinite scroll list)
  - `/search` Search
  - `/calendar` Weekly airing schedule
  - `/anime/$id` Anime detail (episodes, characters)
  - `/anime/$id/episode/$ep` Player page
  - `/watchlist` Watchlist
  - `/history` Watch history
  - `/me` User center
  - `/settings` Settings (cache, decoding, Anime4K, trackers)

  ## Frontend Conventions
  - Call Rust commands via `invoke()` from `@tauri-apps/api/core`
  - Rust commands use `#[tauri::command]` and are registered in `invoke_handler(generate_handler![...])`
  - TanStack Query manages data fetching and caching; home list results are injected into detail cache per item
  - `routeTree.gen.ts` is auto-generated by the router plugin — do not edit manually
  - Add new pages by creating files under `src/routes/`

  ## Data Persistence
  All user data is stored in SQLite (kuriume.db):
  - Settings (cache directory, hardware decoding, volume, playback speed, Anime4K mode, tracker list, etc.)
  - Watch history (playback position, timestamp, resolution, subtitle, group)
  - Watchlist (status: unwatched / watching / completed)

rules:
  proposal:
    - Write in English
    - Clearly state the affected platform scope (macOS/Windows/iOS/Android)
    - When the player is involved, specify which engine is affected (HTML5/mpv/both)
  design:
    - Write in English
    - Frontend changes must specify affected routes and components
    - Backend changes must specify affected Rust crates and Tauri commands
    - If new Tauri commands are introduced, plan both the frontend invoke calls and backend generate_handler registration
  tasks:
    - Write in English
    - Each task should be independently completable and verifiable
    - Separate frontend and backend changes into distinct tasks
    - When new Tauri commands are involved, backend tasks come before frontend tasks
